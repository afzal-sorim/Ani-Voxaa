<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forecast & Projections Report — VOXA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    :root {
      /* Golden Executive Light Theme */
      --bg: #F8F7F4;
      --bg2: #F0EDE6;
      --surf: #FFFFFF;
      --surf-hover: #F5F3EE;
      --txt: #1A1A1F;
      --txt2: #6B6B7B;
      --txt3: #9CA3AF;
      --brd: rgba(0, 0, 0, 0.08);
      --brd2: rgba(0, 0, 0, 0.15);
      --gold-acc: #B8962E;
      --gold-grad: linear-gradient(135deg, #D4AF37, #F5E6B3, #B8962E);
      
      --radius: 12px;
      --radius-sm: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: auto !important;
      min-height: 0 !important;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--txt);
      padding: 20px 20px 0 20px;
      line-height: 1.6;
      font-size: 13px;
    }

    .page {
      width: 100%;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .header {
      background: var(--surf);
      border: 0.5px solid var(--brd2);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
    }

    .eyebrow {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--gold-acc);
      margin-bottom: 8px;
    }

    .title {
      font-size: 24px;
      font-weight: 700;
      color: var(--txt);
      letter-spacing: -0.02em;
    }

    .summary {
      font-size: 13px;
      color: var(--txt2);
      margin-top: 8px;
      max-width: 600px;
    }

    .meta-stack {
      display: flex;
      gap: 12px;
    }

    .meta-card {
      background: var(--bg2);
      border: 0.5px solid var(--brd2);
      padding: 12px 16px;
      border-radius: 10px;
      min-width: 140px;
    }

    .meta-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--txt3);
      margin-bottom: 4px;
    }

    .meta-value {
      font-size: 12px;
      font-weight: 600;
      color: var(--txt);
    }

    /* ── Grid System ── */
    .grid {
      display: grid;
      gap: 16px;
      margin-bottom: 16px;
    }

    .kpi-row {
      grid-template-columns: repeat(4, 1fr);
    }

    .content-row {
      grid-template-columns: repeat(12, 1fr);
    }

    .panel {
      background: var(--surf);
      border: 0.5px solid var(--brd);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }

    /* ── KPI Cards ── */
    .kpi-card {
      border-left: 3px solid var(--gold-acc);
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: all 0.2s ease;
    }

    .kpi-card:hover {
      background: var(--surf-hover);
      transform: translateY(-2px);
    }

    .kpi-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--txt2);
    }

    .kpi-value {
      font-size: 26px;
      font-weight: 700;
      color: var(--txt);
    }

    .kpi-sub {
      font-size: 11px;
      color: var(--txt3);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ── Charts ── */
    .panel-wide { grid-column: span 8; }
    .panel-side { grid-column: span 4; }
    .panel-full { grid-column: span 12; }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .panel-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--txt);
    }

    .chart-container {
      height: 280px;
      position: relative;
    }

    .donut-container {
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Table ── */
    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    th {
      text-align: left;
      padding: 10px 14px;
      color: var(--txt3);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 10px;
      background: var(--bg2);
    }

    td {
      padding: 12px 14px;
      border-bottom: 0.5px solid var(--bg2);
      color: var(--txt2);
    }

    tr:hover td {
      background: var(--surf-hover);
    }

    .model-name {
      color: var(--txt);
      font-weight: 600;
    }

    /* ── Insights & Bars ── */
    .insight-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .insight-item {
      background: var(--bg2);
      padding: 10px 12px;
      border-radius: 8px;
      display: flex;
      gap: 10px;
      font-size: 12px;
      color: var(--txt2);
    }

    .bar-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 16px;
    }

    .bar-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .bar-label-group {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-weight: 600;
    }

    .bar-track {
      height: 6px;
      background: var(--bg2);
      border-radius: 10px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: var(--gold-acc);
      border-radius: 10px;
    }

    .footer {
      text-align: right;
      padding: 16px 0;
      font-size: 10px;
      color: var(--txt3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    @media (max-width: 1200px) {
      .kpi-row { grid-template-columns: repeat(2, 1fr); }
      .panel-wide, .panel-side { grid-column: span 12; }
    }

    @media (max-width: 700px) {
      .kpi-row { grid-template-columns: 1fr; }
      .header { flex-direction: column; gap: 16px; }
    }
  </style>
</head>

<body>
  <div class="page" id="app"></div>

  <script>
    function renderForecast(data) {
      const app = document.getElementById('app');
      
      const maxBarValue = data.barChart?.items ? Math.max(...data.barChart.items.map(i => i.value)) : 1;

      app.innerHTML = `
        <header class="header">
          <div>
            <span class="eyebrow">Strategic Projection Engine</span>
            <h1 class="title">${data.title || 'Forecast Analysis'}</h1>
            <p class="summary">${data.summary || 'Projections based on historical performance and current production cycles.'}</p>
          </div>
          <div class="meta-stack">
            <div class="meta-card">
              <div class="meta-label">Forecast period</div>
              <div class="meta-value">${data.period || 'Upcoming Cycle'}</div>
            </div>
            <div class="meta-card">
              <div class="meta-label">Facility scope</div>
              <div class="meta-value">${data.scope || 'Global Ops'}</div>
            </div>
          </div>
        </header>

        <section class="grid kpi-row">
          ${(data.kpis || []).map(kpi => `
            <div class="panel kpi-card">
              <div class="kpi-label">${kpi.label}</div>
              <div class="kpi-value">${kpi.value}</div>
              <div class="kpi-sub">${kpi.sub || ''}</div>
            </div>
          `).join('')}
        </section>

        <section class="grid content-row">
          <div class="panel panel-full">
            <div class="panel-header">
              <h2 class="panel-title">Model-Specific Forecast Breakdown</h2>
            </div>
            <div class="table-container">
              <table>
                <thead>
                  <tr>
                    <th>Vehicle Model</th>
                    <th>Projected Units</th>
                    <th>Expected Revenue</th>
                    <th>System Confidence</th>
                  </tr>
                </thead>
                <tbody>
                  ${(data.table?.rows || []).map(row => `
                    <tr>
                      <td><span class="model-name">${row[0]}</span></td>
                      <td>${row[1]}</td>
                      <td>${row[2]}</td>
                      <td><span style="color:var(--gold-acc); font-weight:700">HIGH</span></td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>

          <div class="panel panel-wide">
            <div class="panel-header">
              <h2 class="panel-title">Weekly Projection Trend</h2>
            </div>
            <div class="chart-container">
              <canvas id="trendChart"></canvas>
            </div>
          </div>

          <div class="panel panel-side">
            <div class="panel-header">
              <h2 class="panel-title">Volume Distribution</h2>
            </div>
            <div class="donut-container">
              <canvas id="distChart"></canvas>
            </div>
          </div>

          <div class="panel panel-side">
            <div class="panel-header">
              <h2 class="panel-title">Executive Insights</h2>
            </div>
            <div class="insight-list">
              ${(data.insights || []).map(insight => `
                <div class="insight-item">
                  <span>${insight.icon || '💡'}</span>
                  <span>${insight.text}</span>
                </div>
              `).join('')}
            </div>
          </div>

          <div class="panel panel-wide">
            <div class="panel-header">
              <h2 class="panel-title">${data.barChart?.title || 'Performance by Model'}</h2>
            </div>
            <div class="bar-stack">
              ${(data.barChart?.items || []).map(item => `
                <div class="bar-row">
                  <div class="bar-label-group">
                    <span>${item.label}</span>
                    <span class="color:var(--txt3)">${item.value.toLocaleString()} Units</span>
                  </div>
                  <div class="bar-track">
                    <div class="bar-fill" style="width: ${(item.value / maxBarValue) * 100}%"></div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        </section>
        
        <footer class="footer">
          VOXA Strategic Analytics • Deterministic Reporting Pipeline
        </footer>
      `;

      // 1. Trend Chart
      if (data.trend) {
        new Chart(document.getElementById('trendChart'), {
          type: 'line',
          data: {
            labels: data.trend.labels,
            datasets: data.trend.datasets.map((ds, i) => ({
              label: ds.label,
              data: ds.data,
              borderColor: '#B8962E',
              backgroundColor: 'rgba(212, 175, 55, 0.08)',
              fill: true,
              tension: 0.4,
              borderWidth: 2.5,
              pointRadius: 4,
              pointBackgroundColor: '#FFFFFF'
            }))
          },
          options: {
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              y: { 
                beginAtZero: true, 
                grid: { color: 'rgba(0,0,0,0.03)', drawBorder: false },
                ticks: { font: { family: 'DM Sans', size: 10 }, color: '#9CA3AF' }
              },
              x: { 
                grid: { display: false },
                ticks: { font: { family: 'DM Sans', size: 10, weight: '600' }, color: '#6B6B7B' }
              }
            },
            elements: {
              point: {
                radius: 4,
                hoverRadius: 6,
                backgroundColor: '#B8962E',
                borderWidth: 2,
                borderColor: '#FFFFFF'
              },
              line: {
                tension: 0.4,
                borderWidth: 3
              }
            }
          }
        });
      }

      // 2. Distribution Chart
      if (data.distribution) {
        new Chart(document.getElementById('distChart'), {
          type: 'doughnut',
          data: {
            labels: data.distribution.labels,
            datasets: [{
              data: data.distribution.values,
              backgroundColor: [
                '#6366f1', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', 
                '#ec4899', '#06b6d4', '#f97316', '#14b8a6', '#4f46e5'
              ],
              borderWidth: 2,
              borderColor: '#FFFFFF'
            }]
          },
          options: {
            maintainAspectRatio: false,
            cutout: '70%',
            plugins: {
              legend: { position: 'bottom', labels: { boxWidth: 10, font: { family: 'DM Sans', size: 10 } } }
            }
          }
        });
      }
    }

    // Injection Point
    const forecastData = window.__FORECAST_DATA__;
    if (forecastData) renderForecast(forecastData);

    function sendHeight() {
      const height = document.documentElement.scrollHeight || document.body.scrollHeight;
      window.parent.postMessage({ type: 'setHeight', height: height }, '*');
    }
    window.addEventListener('load', sendHeight);
    if (window.ResizeObserver) {
      const observer = new ResizeObserver(sendHeight);
      observer.observe(document.body);
    }
  </script>
</body>

</html>
