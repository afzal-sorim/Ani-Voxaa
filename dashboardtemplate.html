<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --surface-tint: #eef4ff;
      --border: #e5e7eb;
      --border-strong: #d1d5db;
      --text: #0f172a;
      --muted: #64748b;
      --subtle: #94a3b8;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --success: #16a34a;
      --success-soft: #dcfce7;
      --warning: #d97706;
      --warning-soft: #fef3c7;
      --danger: #dc2626;
      --danger-soft: #fee2e2;
      --violet: #7c3aed;
      --violet-soft: #ede9fe;
      --teal: #0f766e;
      --teal-soft: #ccfbf1;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
      --shadow-md: 0 10px 30px rgba(15, 23, 42, 0.06);
      --radius: 18px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      width: 100%;
      max-width: 100%;
      margin: 0;
      padding: 12px;
    }

    .header {
      background: linear-gradient(135deg, #ffffff 0%, #f7fbff 100%);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow-md);
      padding: 24px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: start;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--primary);
      background: var(--primary-soft);
      border: 1px solid #bfdbfe;
      padding: 8px 12px;
      border-radius: 999px;
      margin-bottom: 14px;
    }

    .title {
      margin: 0;
      font-size: clamp(28px, 3vw, 40px);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .meta, .summary, .fallback {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
      margin-top: 10px;
    }

    .summary strong, .fallback strong { color: var(--text); }

    .meta-stack {
      display: grid;
      gap: 12px;
      min-width: 250px;
    }

    .meta-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      box-shadow: var(--shadow-sm);
    }

    .meta-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--subtle);
      font-weight: 700;
      margin-bottom: 6px;
    }

    .meta-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.5;
      word-break: break-word;
    }

    .grid {
      display: grid;
      gap: 20px;
      margin-top: 20px;
    }

    .kpi-grid {
      grid-template-columns: repeat(12, minmax(0, 1fr));
    }

    .kpi-card {
      grid-column: span 3;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
      box-shadow: var(--shadow-sm);
      display: grid;
      gap: 12px;
      min-height: 150px;
    }

    .kpi-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .kpi-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
    }

    .kpi-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: 800;
    }

    .kpi-value {
      font-size: clamp(28px, 2.2vw, 38px);
      line-height: 1;
      letter-spacing: -0.03em;
      font-weight: 800;
      color: var(--text);
    }

    .kpi-sub {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .kpi-delta {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
      border-radius: 999px;
      padding: 7px 10px;
    }

    .delta-good { background: var(--success-soft); color: var(--success); }
    .delta-bad { background: var(--danger-soft); color: var(--danger); }
    .delta-neutral { background: #eef2ff; color: #4338ca; }

    .kpi-blue .kpi-icon { background: #dbeafe; color: #2563eb; }
    .kpi-green .kpi-icon { background: #dcfce7; color: #16a34a; }
    .kpi-red .kpi-icon { background: #fee2e2; color: #dc2626; }
    .kpi-amber .kpi-icon { background: #fef3c7; color: #d97706; }
    .kpi-violet .kpi-icon { background: #ede9fe; color: #7c3aed; }
    .kpi-teal .kpi-icon { background: #ccfbf1; color: #0f766e; }

    .content-grid {
      grid-template-columns: repeat(12, minmax(0, 1fr));
      align-items: start;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px 0;
      margin-bottom: 8px;
    }

    .panel-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .panel-subtitle {
      color: var(--muted);
      font-size: 13px;
    }

    .panel-body {
      padding: 0 20px 20px;
    }

    .panel-wide { grid-column: span 8; }
    .panel-side { grid-column: span 4; }
    .panel-full { grid-column: 1 / -1; }
    .panel-half { grid-column: span 6; }

    .chart-wrap {
      height: 320px;
      position: relative;
    }

    .chart-center-note {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    .bar-list {
      display: grid;
      gap: 14px;
      margin-top: 8px;
    }

    .bar-row {
      display: grid;
      gap: 8px;
    }

    .bar-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 13px;
    }

    .bar-label {
      color: var(--text);
      font-weight: 600;
      min-width: 0;
    }

    .bar-value {
      color: var(--muted);
      font-weight: 700;
      white-space: nowrap;
    }

    .bar-track {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: #edf2f7;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: inherit;
    }

    .bar-blue { background: linear-gradient(90deg, #60a5fa, #2563eb); }
    .bar-green { background: linear-gradient(90deg, #4ade80, #16a34a); }
    .bar-amber { background: linear-gradient(90deg, #fbbf24, #d97706); }
    .bar-red { background: linear-gradient(90deg, #f87171, #dc2626); }
    .bar-violet { background: linear-gradient(90deg, #a78bfa, #7c3aed); }
    .bar-teal { background: linear-gradient(90deg, #2dd4bf, #0f766e); }

    .insight-list, .alert-list {
      display: grid;
      gap: 12px;
      margin-top: 8px;
    }

    .insight-item, .alert-item {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: start;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--surface-soft);
    }

    .insight-icon, .alert-dot {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-size: 16px;
      font-weight: 800;
      margin-top: 2px;
    }

    .insight-blue .insight-icon { background: #dbeafe; color: #2563eb; }
    .insight-green .insight-icon { background: #dcfce7; color: #16a34a; }
    .insight-amber .insight-icon { background: #fef3c7; color: #d97706; }
    .insight-red .insight-icon { background: #fee2e2; color: #dc2626; }

    .insight-text, .alert-main {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
    }

    .alert-main strong { display: block; margin-bottom: 4px; }
    .alert-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .alert-high .alert-dot { background: #fee2e2; color: #dc2626; }
    .alert-medium .alert-dot { background: #fef3c7; color: #d97706; }
    .alert-low .alert-dot { background: #dcfce7; color: #16a34a; }

    .table-shell {
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      background: var(--surface);
      margin-top: 6px;
    }

    .table-scroll {
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 640px;
    }

    thead th {
      background: #f8fafc;
      color: var(--muted);
      text-align: left;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tbody td {
      padding: 14px 16px;
      border-bottom: 1px solid #eef2f7;
      font-size: 14px;
      color: var(--text);
      vertical-align: top;
    }

    tbody tr:hover { background: #fbfdff; }
    tbody tr:last-child td { border-bottom: none; }

    .empty-state {
      display: grid;
      place-items: center;
      min-height: 180px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      border: 1px dashed var(--border-strong);
      border-radius: 18px;
      background: linear-gradient(180deg, #ffffff, #fafcff);
      padding: 24px;
    }

    .footer-note {
      color: var(--subtle);
      font-size: 12px;
      margin-top: 18px;
      text-align: right;
    }

    @media (max-width: 1180px) {
      .kpi-card { grid-column: span 6; }
      .panel-wide, .panel-side, .panel-half { grid-column: 1 / -1; }
    }

    @media (max-width: 760px) {
      .page { padding: 14px; }
      .header { grid-template-columns: 1fr; padding: 18px; border-radius: 20px; }
      .kpi-card { grid-column: 1 / -1; }
      .panel-header { padding: 16px 16px 0; }
      .panel-body { padding: 0 16px 16px; }
      .chart-wrap { height: 280px; }
      table { min-width: 560px; }
    }
  </style>
</head>
<body>
  <div class="page" id="app"></div>

  <script>
    const ICON_MAP = {
      revenue: '$',
      units: '#',
      alerts: '!',
      forecast: '~',
      production: '#',
      generic: '*'
    };

    const CHART_COLORS = ['#2563eb', '#16a34a', '#d97706', '#dc2626', '#7c3aed', '#0f766e', '#0891b2', '#ea580c'];
    let chartRefs = [];

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function normalizeColorClass(v, fallback) {
      const allowed = new Set([
        'kpi-blue', 'kpi-green', 'kpi-red', 'kpi-amber', 'kpi-violet', 'kpi-teal',
        'bar-blue', 'bar-green', 'bar-amber', 'bar-red', 'bar-violet', 'bar-teal',
        'insight-blue', 'insight-green', 'insight-amber', 'insight-red'
      ]);
      return allowed.has(v) ? v : fallback;
    }

    function iconForLabel(label = '') {
      const l = String(label).toLowerCase();
      if (l.includes('revenue') || l.includes('sales')) return ICON_MAP.revenue;
      if (l.includes('unit') || l.includes('production')) return ICON_MAP.units;
      if (l.includes('alert') || l.includes('issue')) return ICON_MAP.alerts;
      if (l.includes('forecast')) return ICON_MAP.forecast;
      return ICON_MAP.generic;
    }

    function renderHeader(data) {
      return `
        <section class="header">
          <div>
            <div class="eyebrow">Dashboard Report</div>
            <h1 class="title">${escapeHtml(data.title || 'Operational Dashboard')}</h1>
            ${data.summary ? `<div class="summary">${data.summary}</div>` : ''}
            ${data.fallback ? `<div class="fallback"><strong>Note:</strong> ${escapeHtml(data.fallback)}</div>` : ''}
          </div>
          <div class="meta-stack">
            <div class="meta-card">
              <div class="meta-label">Reporting Period</div>
              <div class="meta-value">${escapeHtml(data.period || 'All Available Data')}</div>
            </div>
            ${data.scope ? `
              <div class="meta-card">
                <div class="meta-label">Scope</div>
                <div class="meta-value">${escapeHtml(data.scope)}</div>
              </div>
            ` : ''}
            <div class="meta-card">
              <div class="meta-label">Generated</div>
              <div class="meta-value">${new Date().toLocaleString()}</div>
            </div>
          </div>
        </section>
      `;
    }

    function renderKpis(kpis = []) {
      if (!Array.isArray(kpis) || !kpis.length) return '';
      return `
        <section class="grid kpi-grid">
          ${kpis.map((kpi) => {
            const colorClass = normalizeColorClass(kpi.colorClass, 'kpi-blue');
            const deltaClass = kpi.deltaClass || 'delta-neutral';
            return `
              <article class="kpi-card ${colorClass}">
                <div class="kpi-top">
                  <div class="kpi-label">${escapeHtml(kpi.label || 'Metric')}</div>
                  <div class="kpi-icon">${escapeHtml(kpi.icon || iconForLabel(kpi.label))}</div>
                </div>
                <div class="kpi-value">${escapeHtml(kpi.value ?? '—')}</div>
                ${kpi.sub ? `<div class="kpi-sub">${escapeHtml(kpi.sub)}</div>` : '<div class="kpi-sub">&nbsp;</div>'}
                ${kpi.delta ? `<div class="kpi-delta ${deltaClass}">${escapeHtml(kpi.delta)}</div>` : ''}
              </article>
            `;
          }).join('')}
        </section>
      `;
    }

    function renderBarChartCard(barChart) {
      if (!barChart || !Array.isArray(barChart.items) || !barChart.items.length) {
        return `
          <section class="panel panel-wide">
            <div class="panel-header">
              <div>
                <h3 class="panel-title">Breakdown</h3>
                <div class="panel-subtitle">No grouped values available</div>
              </div>
            </div>
            <div class="panel-body">
              <div class="empty-state">No grouped chart data available for this query.</div>
            </div>
          </section>
        `;
      }

      const max = Number(barChart.max || Math.max(...barChart.items.map(x => Number(String(x.value).replace(/,/g, '')) || 0)) || 1);
      return `
        <section class="panel panel-wide">
          <div class="panel-header">
            <div>
              <h3 class="panel-title">${escapeHtml(barChart.title || 'Breakdown')}</h3>
              <div class="panel-subtitle">Accurate values rendered directly from query output</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="bar-list">
              ${barChart.items.map(item => {
                const raw = Number(String(item.value).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0;
                const width = Math.max(4, (raw / (max || 1)) * 100);
                return `
                  <div class="bar-row">
                    <div class="bar-meta">
                      <div class="bar-label">${escapeHtml(item.label || 'Item')}</div>
                      <div class="bar-value">${escapeHtml(item.value ?? '0')}</div>
                    </div>
                    <div class="bar-track">
                      <div class="bar-fill ${normalizeColorClass(item.colorClass, 'bar-blue')}" style="width:${width}%"></div>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        </section>
      `;
    }

    function renderDonutCard(donut) {
      if (!donut || !Array.isArray(donut.items) || !donut.items.length) {
        return `
          <section class="panel panel-side">
            <div class="panel-header">
              <div>
                <h3 class="panel-title">Highlights</h3>
                <div class="panel-subtitle">Summary widgets and insights</div>
              </div>
            </div>
            <div class="panel-body">
              <div class="empty-state">No donut distribution available for this report.</div>
            </div>
          </section>
        `;
      }

      return `
        <section class="panel panel-side">
          <div class="panel-header">
            <div>
              <h3 class="panel-title">${escapeHtml(donut.title || 'Distribution')}</h3>
              <div class="panel-subtitle">Part-to-whole view</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="chart-wrap">
              <canvas id="donutChart"></canvas>
            </div>
          </div>
        </section>
      `;
    }

    function renderTrendCard(trend) {
      if (!trend || !Array.isArray(trend.items) || !trend.items.length) return '';

      return `
        <section class="panel panel-full">
          <div class="panel-header">
            <div>
              <h3 class="panel-title">${escapeHtml(trend.title || 'Trend Analysis')}</h3>
              <div class="panel-subtitle">Performance over time</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="chart-wrap" style="height: 350px;">
              <canvas id="trendChart"></canvas>
            </div>
          </div>
        </section>
      `;
    }

    function renderInsights(insights = []) {
      if (!Array.isArray(insights) || !insights.length) {
        return `
          <section class="panel panel-half">
            <div class="panel-header">
              <div>
                <h3 class="panel-title">Insights</h3>
                <div class="panel-subtitle">Auto-generated from deterministic data</div>
              </div>
            </div>
            <div class="panel-body">
              <div class="empty-state">No additional insights were generated for this report.</div>
            </div>
          </section>
        `;
      }

      return `
        <section class="panel panel-half">
          <div class="panel-header">
            <div>
              <h3 class="panel-title">Insights</h3>
              <div class="panel-subtitle">Key observations for this query</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="insight-list">
              ${insights.map((item, idx) => {
                const cls = normalizeColorClass(item.colorClass, ['insight-blue','insight-green','insight-amber','insight-red'][idx % 4]);
                return `
                  <div class="insight-item ${cls}">
                    <div class="insight-icon">${escapeHtml(item.icon || '*')}</div>
                    <div class="insight-text">${item.text || ''}</div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        </section>
      `;
    }

    function renderAlerts(alerts = []) {
      if (!Array.isArray(alerts) || !alerts.length) {
        return `
          <section class="panel panel-half">
            <div class="panel-header">
              <div>
                <h3 class="panel-title">Alerts</h3>
                <div class="panel-subtitle">Current records in scope</div>
              </div>
            </div>
            <div class="panel-body">
              <div class="empty-state">No active alerts for the selected period.</div>
            </div>
          </section>
        `;
      }

      return `
        <section class="panel panel-half">
          <div class="panel-header">
            <div>
              <h3 class="panel-title">Alerts</h3>
              <div class="panel-subtitle">Prioritised operational issues</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="alert-list">
              ${alerts.map((alert) => {
                const sev = String(alert.severity || 'HIGH').toLowerCase();
                const sevClass = sev.includes('low') ? 'alert-low' : sev.includes('medium') ? 'alert-medium' : 'alert-high';
                return `
                  <div class="alert-item ${sevClass}">
                    <div class="alert-dot">!</div>
                    <div class="alert-main">
                      <strong>${escapeHtml(alert.name || 'Alert')}</strong>
                      ${alert.meta ? `<div class="alert-meta">${escapeHtml(alert.meta)}</div>` : ''}
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        </section>
      `;
    }

    function renderTable(table) {
      if (!table || !Array.isArray(table.headers) || !table.headers.length) {
        return '';
      }

      const rows = Array.isArray(table.rows) ? table.rows : [];
      return `
        <section class="panel panel-full">
          <div class="panel-header">
            <div>
              <h3 class="panel-title">${escapeHtml(table.title || 'Detailed Data')}</h3>
              <div class="panel-subtitle">Underlying values used in this dashboard</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="table-shell">
              <div class="table-scroll">
                <table>
                  <thead>
                    <tr>${table.headers.map(h => `<th>${escapeHtml(h)}</th>`).join('')}</tr>
                  </thead>
                  <tbody>
                    ${rows.length ? rows.map(row => `
                      <tr>${row.map(cell => `<td>${escapeHtml(cell)}</td>`).join('')}</tr>
                    `).join('') : `<tr><td colspan="${table.headers.length}">No rows available.</td></tr>`}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </section>
      `;
    }

    function destroyCharts() {
      chartRefs.forEach(c => {
        try { c.destroy(); } catch (e) {}
      });
      chartRefs = [];
    }

    function mountDonutChart(donut) {
      if (!donut || !Array.isArray(donut.items) || !donut.items.length) return;
      const el = document.getElementById('donutChart');
      if (!el) return;
      const labels = donut.items.map(x => x.label || 'Item');
      const values = donut.items.map(x => Number(x.value) || 0);
      const chart = new Chart(el, {
        type: 'doughnut',
        data: {
          labels,
          datasets: [{
            data: values,
            backgroundColor: CHART_COLORS,
            borderColor: '#ffffff',
            borderWidth: 3,
            hoverOffset: 6
          }]
        },
        options: {
          maintainAspectRatio: false,
          cutout: '68%',
          plugins: {
            legend: {
              position: 'bottom',
              labels: {
                color: '#475569',
                usePointStyle: true,
                pointStyle: 'circle',
                padding: 18,
                font: { family: 'Inter', size: 12, weight: '600' }
              }
            },
            tooltip: {
              backgroundColor: '#0f172a',
              titleColor: '#ffffff',
              bodyColor: '#e2e8f0',
              padding: 12,
              cornerRadius: 12
            }
          }
        }
      });
      chartRefs.push(chart);
    }

    function mountTrendChart(trend) {
      if (!trend || !Array.isArray(trend.items) || !trend.items.length) return;
      const el = document.getElementById('trendChart');
      if (!el) return;
      
      const labels = trend.items.map(x => x.label);
      const values = trend.items.map(x => Number(String(x.value).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);
      
      const chart = new Chart(el, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: trend.title || 'Trend',
            data: values,
            borderColor: '#2563eb',
            backgroundColor: 'rgba(37, 99, 235, 0.1)',
            borderWidth: 3,
            fill: true,
            tension: 0.4,
            pointRadius: 4,
            pointBackgroundColor: '#ffffff',
            pointBorderColor: '#2563eb',
            pointBorderWidth: 2
          }]
        },
        options: {
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#0f172a',
              padding: 12,
              cornerRadius: 12
            }
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { color: '#64748b', font: { size: 11, weight: '600' } }
            },
            y: {
              grid: { color: '#f1f5f9' },
              ticks: { color: '#64748b', font: { size: 11 } }
            }
          }
        }
      });
      chartRefs.push(chart);
    }

    function renderDashboard(data) {
      const app = document.getElementById('app');
      destroyCharts();
      app.innerHTML = `
        ${renderHeader(data)}
        ${renderKpis(data.kpis || [])}
        ${renderTrendCard(data.trend)}
        <section class="grid content-grid">
          ${renderBarChartCard(data.barChart)}
          ${renderDonutCard(data.donut)}
          ${renderInsights(data.insights || [])}
          ${renderAlerts(data.alerts || [])}
          ${renderTable(data.table)}
        </section>
        <div class="footer-note">Dashboard rendered in a fixed light theme for consistent report-style responses.</div>
      `;
      mountDonutChart(data.donut);
      mountTrendChart(data.trend);
    }

    const sampleData = {
      title: 'Plant Performance Weekly Report',
      period: 'Week 18, 2026',
      scope: 'Chennai Plant',
      summary: 'Production reached <strong>12,480 units</strong> against forecast of <strong>12,000</strong>, while <strong>14 active alerts</strong> affected <strong>310 units</strong>.',
      fallback: '',
      kpis: [
        { label: 'Total Production', value: '12,480', sub: 'Forecast 12,000', icon: '#', colorClass: 'kpi-blue', delta: '+480', deltaClass: 'delta-good' },
        { label: 'Total Revenue', value: '4.8M', sub: 'Forecast 4.6M', icon: '$', colorClass: 'kpi-green', delta: '+200,000', deltaClass: 'delta-good' },
        { label: 'Active Alerts', value: '14', sub: '22 total alerts', icon: '!', colorClass: 'kpi-red' },
        { label: 'Affected Units', value: '310', sub: '2.5% of production', icon: '~', colorClass: 'kpi-amber' }
      ],
      barChart: {
        title: 'Production Units by Department',
        max: 4200,
        items: [
          { label: 'Assembly', value: '4,200', colorClass: 'bar-blue' },
          { label: 'Paint', value: '3,150', colorClass: 'bar-green' },
          { label: 'Body', value: '2,680', colorClass: 'bar-amber' },
          { label: 'QA', value: '2,450', colorClass: 'bar-violet' }
        ]
      },
      donut: {
        title: 'Alert Mix',
        items: [
          { label: 'Quality', value: 8 },
          { label: 'Supply', value: 4 },
          { label: 'Machine', value: 2 }
        ]
      },
      insights: [
        { text: 'Assembly contributed the largest share of total output and remained ahead of every other department in the selected period.', icon: '#', colorClass: 'insight-blue' },
        { text: 'Revenue outperformed forecast, indicating that output gains translated into higher-value production rather than only volume increase.', icon: '$', colorClass: 'insight-green' },
        { text: 'Active alerts still affected a meaningful set of units, so quality review should focus on the highest-volume lines first.', icon: '!', colorClass: 'insight-amber' }
      ],
      alerts: [
        { name: 'Paint finish inconsistency', meta: 'Paint • Chennai', severity: 'HIGH' },
        { name: 'Late supplier batch receipt', meta: 'Assembly • Chennai', severity: 'MEDIUM' }
      ],
      table: {
        title: 'Dashboard Overview',
        headers: ['Metric', 'Actual', 'Forecast', 'Variance'],
        rows: [
          ['Production Units', '12,480', '12,000', '+480'],
          ['Revenue', '4,800,000', '4,600,000', '+200,000'],
          ['Total Alerts', '22', '', ''],
          ['Affected Units', '310', '', '']
        ]
      }
    };

    // DATA_INJECTION_POINT
    const data = window.__DASHBOARD_DATA__ || sampleData;
    renderDashboard(data);
  </script>
</body>
</html>
