<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #fffcf9;
      --surface: #ffffff;
      --surface-soft: #fffaf3;
      --surface-tint: #fff7ed;
      --border: #f1e6d5;
      --border-strong: #e5d4bc;
      --text: #1a1612;
      --muted: #786b5e;
      --subtle: #a39688;
      --primary: #d97706;
      --primary-soft: #fff7ed;
      --success: #16a34a;
      --success-soft: #f0fdf4;
      --warning: #ea580c;
      --warning-soft: #fff7ed;
      --danger: #dc2626;
      --danger-soft: #fef2f2;
      --violet: #7c3aed;
      --violet-soft: #f5f3ff;
      --teal: #0d9488;
      --teal-soft: #f0fdfa;
      --shadow-sm: 0 1px 2px rgba(120, 107, 94, 0.04);
      --shadow-md: 0 10px 30px rgba(120, 107, 94, 0.08);
      --radius: 18px;
      --radius-sm: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      width: 100%;
      max-width: 100%;
      margin: 0;
      padding: 12px;
    }

    .header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow-md);
      padding: 24px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: start;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--primary);
      background: var(--primary-soft);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 999px;
      margin-bottom: 14px;
    }

    .title {
      margin: 0;
      font-size: clamp(28px, 3vw, 40px);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .meta,
    .summary,
    .fallback {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
      margin-top: 10px;
    }

    .summary strong,
    .fallback strong {
      color: var(--text);
    }

    .meta-stack {
      display: grid;
      gap: 12px;
      min-width: 250px;
    }

    .meta-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      box-shadow: var(--shadow-sm);
    }

    .meta-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--subtle);
      font-weight: 700;
      margin-bottom: 6px;
    }

    .meta-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.5;
      word-break: break-word;
    }

    .grid {
      display: grid;
      gap: 20px;
      margin-top: 20px;
    }

    .kpi-grid {
      grid-template-columns: repeat(12, minmax(0, 1fr));
    }

    .kpi-card {
      grid-column: span 3;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
      box-shadow: var(--shadow-sm);
      display: grid;
      gap: 12px;
      min-height: 150px;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
      animation: slideUp 0.5s ease backwards;
    }

    .kpi-card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 15px 45px rgba(15, 23, 42, 0.1);
      border-color: var(--primary-soft);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .kpi-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .kpi-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
    }

    .kpi-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: 800;
    }

    .kpi-value {
      font-size: clamp(28px, 2.2vw, 38px);
      line-height: 1;
      letter-spacing: -0.03em;
      font-weight: 800;
      color: var(--text);
    }

    .kpi-sub {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .kpi-delta {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
      border-radius: 999px;
      padding: 7px 10px;
    }

    .delta-good {
      background: var(--success-soft);
      color: var(--success);
    }

    .delta-bad {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .delta-neutral {
      background: #eef2ff;
      color: #4338ca;
    }

    .kpi-blue .kpi-icon {
      background: #dbeafe;
      color: #2563eb;
    }

    .kpi-green .kpi-icon {
      background: #dcfce7;
      color: #16a34a;
    }

    .kpi-red .kpi-icon {
      background: #fee2e2;
      color: #dc2626;
    }

    .kpi-amber .kpi-icon {
      background: #fef3c7;
      color: #d97706;
    }

    .kpi-violet .kpi-icon {
      background: #ede9fe;
      color: #7c3aed;
    }

    .kpi-teal .kpi-icon {
      background: #ccfbf1;
      color: #0f766e;
    }

    .content-grid {
      grid-template-columns: repeat(12, minmax(0, 1fr));
      align-items: start;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px 0;
      margin-bottom: 8px;
    }

    .panel-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .panel-subtitle {
      color: var(--muted);
      font-size: 13px;
    }

    .panel-body {
      padding: 0 20px 20px;
    }

    .panel-wide {
      grid-column: span 8;
    }

    .panel-side {
      grid-column: span 4;
    }

    .panel-full {
      grid-column: 1 / -1;
    }

    .panel-half {
      grid-column: span 6;
    }

    .chart-wrap {
      height: 320px;
      position: relative;
    }

    .chart-center-note {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    .bar-list {
      display: grid;
      gap: 14px;
      margin-top: 8px;
    }

    .bar-row {
      display: grid;
      gap: 8px;
    }

    .bar-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 13px;
    }

    .bar-label {
      color: var(--text);
      font-weight: 600;
      min-width: 0;
    }

    .bar-value {
      color: var(--muted);
      font-weight: 700;
      white-space: nowrap;
    }

    .bar-track {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: #edf2f7;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: inherit;
    }

    .bar-blue {
      background: var(--primary);
    }

    .bar-green {
      background: var(--success);
    }

    .bar-amber {
      background: var(--warning);
    }

    .bar-red {
      background: var(--danger);
    }

    .bar-violet {
      background: var(--violet);
    }

    .bar-teal {
      background: var(--teal);
    }

    .insight-list,
    .alert-list {
      display: grid;
      gap: 12px;
      margin-top: 8px;
    }

    .insight-item,
    .alert-item {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: start;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--surface);
    }

    .insight-icon,
    .alert-dot {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-size: 16px;
      font-weight: 800;
      margin-top: 2px;
    }

    .insight-blue .insight-icon {
      background: #dbeafe;
      color: #2563eb;
    }

    .insight-green .insight-icon {
      background: #dcfce7;
      color: #16a34a;
    }

    .insight-amber .insight-icon {
      background: #fef3c7;
      color: #d97706;
    }

    .insight-red .insight-icon {
      background: #fee2e2;
      color: #dc2626;
    }

    .insight-text,
    .alert-main {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
    }

    .alert-main strong {
      display: block;
      margin-bottom: 4px;
    }

    .alert-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .alert-high .alert-dot {
      background: #fee2e2;
      color: #dc2626;
    }

    .alert-medium .alert-dot {
      background: #fef3c7;
      color: #d97706;
    }

    .alert-low .alert-dot {
      background: #dcfce7;
      color: #16a34a;
    }

    .table-shell {
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      background: var(--surface);
      margin-top: 6px;
    }

    .table-scroll {
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 640px;
    }

    thead th {
      background: #f8fafc;
      color: var(--muted);
      text-align: left;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tbody td {
      padding: 14px 16px;
      border-bottom: 1px solid #eef2f7;
      font-size: 14px;
      color: var(--text);
      vertical-align: top;
    }

    tbody tr:hover {
      background: #fbfdff;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .empty-state {
      display: grid;
      place-items: center;
      min-height: 180px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      border: 1px dashed var(--border-strong);
      border-radius: 18px;
      background: var(--surface);
      padding: 24px;
    }

    .footer-note {
      color: var(--subtle);
      font-size: 12px;
      margin-top: 18px;
      text-align: right;
    }

    @media (max-width: 1180px) {
      .kpi-card {
        grid-column: span 6;
      }

      .panel-wide,
      .panel-side,
      .panel-half {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 760px) {
      .page {
        padding: 14px;
      }

      .header {
        grid-template-columns: 1fr;
        padding: 18px;
        border-radius: 20px;
      }

      .kpi-card {
        grid-column: 1 / -1;
      }

      .panel-header {
        padding: 16px 16px 0;
      }

      .panel-body {
        padding: 0 16px 16px;
      }

      .chart-wrap {
        height: 280px;
      }

      table {
        min-width: 560px;
      }
    }
  </style>
</head>

<body>
  <div class="page" id="app"></div>

  <script>
    const ICON_MAP = {
      revenue: '$',
      units: '#',
      alerts: '!',
      forecast: '~',
      production: '#',
      generic: '*'
    };

    const CHART_COLORS = [
      '#d97706', // Amber/Gold (Primary)
      '#2563eb', // Blue
      '#0d9488', // Teal
      '#4f46e5', // Indigo
      '#dc2626', // Red
      '#7c3aed', // Violet
      '#0891b2', // Cyan
      '#16a34a'  // Green
    ];

    let chartRefs = [];
    function destroyCharts() {
      chartRefs.forEach(c => c.destroy());
      chartRefs = [];
    }

    function mountBarChart(barData) {
      if (!barData) return;
      const el = document.getElementById('barChart');
      if (!el) return;

      let datasets = [];
      let labels = [];

      if (barData.datasets && Array.isArray(barData.datasets)) {
        labels = barData.labels || [];
        datasets = barData.datasets.map((ds, i) => ({
          label: ds.label || 'Data',
          data: ds.data,
          backgroundColor: CHART_COLORS[i % CHART_COLORS.length],
          borderRadius: 6,
          barThickness: 'flex',
          maxBarThickness: 40
        }));
      } else if (barData.items && Array.isArray(barData.items)) {
        labels = barData.items.map(x => x.label);
        const values = barData.items.map(x => Number(String(x.raw_value || x.value).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);
        datasets = [{
          label: barData.title || 'Value',
          data: values,
          backgroundColor: labels.map((_, i) => CHART_COLORS[i % CHART_COLORS.length]),
          borderRadius: 6,
          barThickness: 'flex',
          maxBarThickness: 40
        }];
      }

      if (!datasets.length) return;

      const chart = new Chart(el, {
        type: 'bar',
        data: { labels, datasets },
        options: {
          maintainAspectRatio: false,
          plugins: {
            legend: { 
              display: datasets.length > 1,
              position: 'top',
              align: 'end',
              labels: { usePointStyle: true, font: { family: 'Inter', size: 11, weight: '600' } }
            },
            tooltip: {
              backgroundColor: '#0f172a',
              padding: 12,
              cornerRadius: 12
            }
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { color: '#64748b', font: { size: 11, weight: '600' } }
            },
            y: {
              beginAtZero: true,
              grid: { color: '#f1f5f9' },
              ticks: { 
                color: '#64748b', 
                font: { size: 11 },
                callback: function(value) {
                  if (value >= 1000000) return (value / 1000000).toFixed(1) + 'M';
                  if (value >= 1000) return (value / 1000).toFixed(1) + 'K';
                  return value;
                }
              }
            }
          }
        }
      });
      chartRefs.push(chart);
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function normalizeColorClass(v, fallback) {
      const allowed = new Set([
        'kpi-blue', 'kpi-green', 'kpi-red', 'kpi-amber', 'kpi-violet', 'kpi-teal',
        'bar-blue', 'bar-green', 'bar-amber', 'bar-red', 'bar-violet', 'bar-teal',
        'insight-blue', 'insight-green', 'insight-amber', 'insight-red'
      ]);
      return allowed.has(v) ? v : fallback;
    }

    function iconForLabel(label = '') {
      const l = String(label).toLowerCase();
      if (l.includes('revenue') || l.includes('sales')) return ICON_MAP.revenue;
      if (l.includes('unit') || l.includes('production')) return ICON_MAP.units;
      if (l.includes('alert') || l.includes('issue')) return ICON_MAP.alerts;
      if (l.includes('forecast')) return ICON_MAP.forecast;
      return ICON_MAP.generic;
    }

    function renderHeader(data) {
      return `
        <section class="header">
          <div>
            <div class="eyebrow">Dashboard Report</div>
            <h1 class="title">${escapeHtml(data.title || 'Operational Dashboard')}</h1>
            ${data.summary ? `<div class="summary">${data.summary}</div>` : ''}
            ${data.fallback ? `<div class="fallback"><strong>Note:</strong> ${escapeHtml(data.fallback)}</div>` : ''}
          </div>
          <div class="meta-stack">
            <div class="meta-card">
              <div class="meta-label">Reporting Period</div>
              <div class="meta-value">${escapeHtml(data.period || 'All Available Data')}</div>
            </div>
            ${data.scope ? `
              <div class="meta-card">
                <div class="meta-label">Scope</div>
                <div class="meta-value">${escapeHtml(data.scope)}</div>
              </div>
            ` : ''}
            <div class="meta-card">
              <div class="meta-label">Generated</div>
              <div class="meta-value">${new Date().toLocaleString()}</div>
            </div>
          </div>
        </section>
      `;
    }

    function renderKpis(kpis = []) {
      if (!Array.isArray(kpis) || !kpis.length) return '';
      return `
        <section class="grid kpi-grid">
          ${kpis.map((kpi) => {
        const colorClass = normalizeColorClass(kpi.colorClass, 'kpi-blue');
        const deltaClass = kpi.deltaClass || 'delta-neutral';
        return `
              <article class="kpi-card ${colorClass}">
                <div class="kpi-top">
                  <div class="kpi-label">${escapeHtml(kpi.label || 'Metric')}</div>
                  <div class="kpi-icon">${escapeHtml(kpi.icon || iconForLabel(kpi.label))}</div>
                </div>
                <div class="kpi-value">${escapeHtml(kpi.value ?? '—')}</div>
                ${kpi.sub ? `<div class="kpi-sub">${escapeHtml(kpi.sub)}</div>` : '<div class="kpi-sub">&nbsp;</div>'}
                ${kpi.delta ? `<div class="kpi-delta ${deltaClass}">${escapeHtml(kpi.delta)}</div>` : ''}
              </article>
            `;
      }).join('')}
        </section>
      `;
    }

    function renderBarChartCard(bar) {
      if (!bar) return '';
      return `
        <section class="panel panel-wide">
          <div class="panel-header">
            <div>
              <h3 class="panel-title">${escapeHtml(bar.title || 'Breakdown')}</h3>
              <div class="panel-subtitle">Comparative analysis by category</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="chart-wrap" style="height: 300px;">
              <canvas id="barChart"></canvas>
            </div>
          </div>
        </section>
      `;
    }

    function renderDonutCard(donut) {
      if (!donut || !Array.isArray(donut.items) || !donut.items.length) {
        return `
          <section class="panel panel-side">
            <div class="panel-header">
              <div>
                <h3 class="panel-title">Highlights</h3>
                <div class="panel-subtitle">Summary widgets and insights</div>
              </div>
            </div>
            <div class="panel-body">
              <div class="empty-state">No donut distribution available for this report.</div>
            </div>
          </section>
        `;
      }

      return `
        <section class="panel panel-side">
          <div class="panel-header">
            <div>
              <h3 class="panel-title">${escapeHtml(donut.title || 'Distribution')}</h3>
              <div class="panel-subtitle">Part-to-whole view</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="chart-wrap">
              <canvas id="donutChart"></canvas>
            </div>
          </div>
        </section>
      `;
    }

    function renderTrendCard(trend) {
      if (!trend || !Array.isArray(trend.items) || !trend.items.length) return '';

      return `
        <section class="panel panel-full">
          <div class="panel-header">
            <div>
              <h3 class="panel-title">${escapeHtml(trend.title || 'Trend Analysis')}</h3>
              <div class="panel-subtitle">Performance over time</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="chart-wrap" style="height: 350px;">
              <canvas id="trendChart"></canvas>
            </div>
          </div>
        </section>
      `;
    }

    function renderInsights(insights = []) {
      if (!Array.isArray(insights) || !insights.length) {
        return `
          <section class="panel panel-half">
            <div class="panel-header">
              <div>
                <h3 class="panel-title">Insights</h3>
                <div class="panel-subtitle">Auto-generated from deterministic data</div>
              </div>
            </div>
            <div class="panel-body">
              <div class="empty-state">No additional insights were generated for this report.</div>
            </div>
          </section>
        `;
      }

      return `
        <section class="panel panel-half">
          <div class="panel-header">
            <div>
              <h3 class="panel-title">Insights</h3>
              <div class="panel-subtitle">Key observations for this query</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="insight-list">
              ${insights.map((item, idx) => {
        const cls = normalizeColorClass(item.colorClass, ['insight-blue', 'insight-green', 'insight-amber', 'insight-red'][idx % 4]);
        return `
                  <div class="insight-item ${cls}">
                    <div class="insight-icon">${escapeHtml(item.icon || '*')}</div>
                    <div class="insight-text">${item.text || ''}</div>
                  </div>
                `;
      }).join('')}
            </div>
          </div>
        </section>
      `;
    }

    function renderAlerts(alerts = []) {
      if (!Array.isArray(alerts) || !alerts.length) {
        return `
          <section class="panel panel-half">
            <div class="panel-header">
              <div>
                <h3 class="panel-title">Alerts</h3>
                <div class="panel-subtitle">Current records in scope</div>
              </div>
            </div>
            <div class="panel-body">
              <div class="empty-state">No active alerts for the selected period.</div>
            </div>
          </section>
        `;
      }

      return `
        <section class="panel panel-half">
          <div class="panel-header">
            <div>
              <h3 class="panel-title">Alerts</h3>
              <div class="panel-subtitle">Prioritised operational issues</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="alert-list">
              ${alerts.map((alert) => {
        const sev = String(alert.severity || 'HIGH').toLowerCase();
        const sevClass = sev.includes('low') ? 'alert-low' : sev.includes('medium') ? 'alert-medium' : 'alert-high';
        return `
                  <div class="alert-item ${sevClass}">
                    <div class="alert-dot">!</div>
                    <div class="alert-main">
                      <strong>${escapeHtml(alert.name || 'Alert')}</strong>
                      ${alert.meta ? `<div class="alert-meta">${escapeHtml(alert.meta)}</div>` : ''}
                    </div>
                  </div>
                `;
      }).join('')}
            </div>
          </div>
        </section>
      `;
    }

    function renderTable(table) {
      if (!table || !Array.isArray(table.headers) || !table.headers.length) {
        return '';
      }

      const rows = Array.isArray(table.rows) ? table.rows : [];
      return `
        <section class="panel panel-full">
          <div class="panel-header">
            <div>
              <h3 class="panel-title">${escapeHtml(table.title || 'Detailed Data')}</h3>
              <div class="panel-subtitle">Underlying values used in this dashboard</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="table-shell">
              <div class="table-scroll">
                <table>
                  <thead>
                    <tr>${table.headers.map(h => `<th>${escapeHtml(h)}</th>`).join('')}</tr>
                  </thead>
                  <tbody>
                    ${rows.length ? rows.map(row => `
                      <tr>${row.map(cell => `<td>${escapeHtml(cell)}</td>`).join('')}</tr>
                    `).join('') : `<tr><td colspan="${table.headers.length}">No rows available.</td></tr>`}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </section>
      `;
    }

    function destroyCharts() {
      chartRefs.forEach(c => {
        try { c.destroy(); } catch (e) { }
      });
      chartRefs = [];
    }

    function mountDonutChart(donut) {
      if (!donut || !Array.isArray(donut.items) || !donut.items.length) return;
      const el = document.getElementById('donutChart');
      if (!el) return;
      const labels = donut.items.map(x => x.label || 'Item');
      const values = donut.items.map(x => Number(x.value) || 0);
      const chart = new Chart(el, {
        type: 'doughnut',
        data: {
          labels,
          datasets: [{
            data: values,
            backgroundColor: CHART_COLORS,
            borderColor: '#ffffff',
            borderWidth: 3,
            hoverOffset: 6
          }]
        },
        options: {
          maintainAspectRatio: false,
          cutout: '68%',
          plugins: {
            legend: {
              position: 'bottom',
              labels: {
                color: '#475569',
                usePointStyle: true,
                pointStyle: 'circle',
                padding: 18,
                font: { family: 'Inter', size: 12, weight: '600' }
              }
            },
            tooltip: {
              backgroundColor: '#0f172a',
              titleColor: '#ffffff',
              bodyColor: '#e2e8f0',
              padding: 12,
              cornerRadius: 12
            }
          }
        }
      });
      chartRefs.push(chart);
    }

    function mountTrendChart(trend) {
      if (!trend) return;
      const el = document.getElementById('trendChart');
      if (!el) return;

      let datasets = [];
      let labels = [];

      if (trend.datasets && Array.isArray(trend.datasets)) {
        labels = trend.labels || [];
        datasets = trend.datasets.map((ds, i) => {
          const color = CHART_COLORS[i % CHART_COLORS.length];
          return {
            label: ds.label || 'Data',
            data: ds.data,
            borderColor: color,
            backgroundColor: `${color}15`,
            borderWidth: 3,
            fill: trend.datasets.length === 1 || ds.label.toLowerCase().includes('actual'),
            tension: 0.4,
            pointRadius: 4,
            pointBackgroundColor: '#ffffff',
            pointBorderColor: color,
            pointBorderWidth: 2
          };
        });
      } else if (trend.items && Array.isArray(trend.items)) {
        labels = trend.items.map(x => x.label);
        const values = trend.items.map(x => Number(String(x.value).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);
        datasets = [{
          label: trend.title || 'Trend',
          data: values,
          borderColor: CHART_COLORS[0],
          backgroundColor: `${CHART_COLORS[0]}15`,
          borderWidth: 3,
          fill: true,
          tension: 0.4,
          pointRadius: 4,
          pointBackgroundColor: '#ffffff',
          pointBorderColor: CHART_COLORS[0],
          pointBorderWidth: 2
        }];
      }

      if (!datasets.length) return;

      const chart = new Chart(el, {
        type: 'line',
        data: { labels, datasets },
        options: {
          maintainAspectRatio: false,
          plugins: {
            legend: { 
              display: datasets.length > 1,
              position: 'bottom',
              labels: {
                usePointStyle: true,
                padding: 15,
                font: { family: 'Inter', size: 11, weight: '600' }
              }
            },
            tooltip: {
              backgroundColor: '#0f172a',
              padding: 12,
              cornerRadius: 12
            }
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { color: '#64748b', font: { size: 11, weight: '600' } }
            },
            y: {
              grid: { color: '#f1f5f9' },
              ticks: { 
                color: '#64748b', 
                font: { size: 11 },
                callback: function(value) {
                  if (value >= 1000000) return (value / 1000000).toFixed(1) + 'M';
                  if (value >= 1000) return (value / 1000).toFixed(1) + 'K';
                  return value;
                }
              }
            }
          }
        }
      });
      chartRefs.push(chart);
    }

    function renderDashboard(data) {
      const app = document.getElementById('app');
      destroyCharts();
      app.innerHTML = `
        ${renderHeader(data)}
        ${renderKpis(data.kpis || [])}
        ${renderTrendCard(data.trend)}
        <section class="grid content-grid">
          ${renderBarChartCard(data.barChart)}
          ${renderDonutCard(data.donut)}
          ${renderInsights(data.insights || [])}
          ${renderAlerts(data.alerts || [])}
          ${renderTable(data.table)}
        </section>
      `;
      mountDonutChart(data.donut);
      mountTrendChart(data.trend);
      mountBarChart(data.barChart);
    }

    // DATA_INJECTION_POINT
    const data = window.__DASHBOARD_DATA__ || {};
    if (Object.keys(data).length > 0) {
      renderDashboard(data);
    } else {
      document.getElementById('app').innerHTML = '<div class="empty-state">Waiting for database results...</div>';
    }
    renderDashboard(data);
  </script>
</body>

</html>
